spring.application.name=flexiwork
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/flexiwork?useSSL=false&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Colombo

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Session (30 min — Sri Lanka timezone)
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.name=FLEXIWORK_SESSION

# Springdoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# SQL init — handled by DataInitializer.java
spring.sql.init.mode=never

# Error pages
server.error.whitelabel.enabled=false

# FlexiWork System Admin credentials
admin.email=${ADMIN_EMAIL:admin@flexiwork.lk}
admin.password=${ADMIN_PASSWORD:Admin@1234}
admin.name=${ADMIN_NAME:FlexiWork Administrator}

# Public base URL (used inside QR codes)
app.base-url=http://localhost:8080

# Twilio WhatsApp
twilio.account-sid=${TWILIO_SID:not-configured}
twilio.auth-token=${TWILIO_AUTH_TOKEN:not-configured}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# Document auto-approval (hours to wait before auto-approving pending docs)
app.doc.auto-approve-hours=24

# Gmail SMTP (password reset emails)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:not-configured}
spring.mail.password=${MAIL_PASSWORD:not-configured}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
