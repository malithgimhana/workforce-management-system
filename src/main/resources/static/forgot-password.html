<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — FlexiWork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#EB1700' } } } }</script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>* { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="flex items-center justify-center gap-2 mb-8">
    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
      <span class="text-white font-black">FW</span>
    </div>
    <span class="font-black text-xl text-gray-900">FlexiWork</span>
  </div>

  <div class="bg-white rounded-3xl shadow-lg p-8">

    <!-- Step 1: Enter Email -->
    <div id="step-1">
      <h1 class="text-2xl font-black text-gray-900 mb-1">Forgot Password</h1>
      <p class="text-sm text-gray-500 mb-6">Enter your registered email address. We'll send a 6-digit OTP to reset your password.</p>

      <div id="err-1" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4"></div>

      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
        <input id="email" type="email" placeholder="e.g. you@example.com"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
          onkeydown="if(event.key==='Enter') sendOtp()"/>
      </div>

      <button onclick="sendOtp()" id="btn-otp"
        class="w-full bg-primary hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition">
        Send OTP via Email
      </button>
    </div>

    <!-- Step 2: Enter OTP + New Password -->
    <div id="step-2" class="hidden">
      <h1 class="text-2xl font-black text-gray-900 mb-1">Reset Password</h1>
      <p class="text-sm text-gray-500 mb-1">Enter the OTP sent to</p>
      <p class="text-sm font-bold text-primary mb-6" id="email-display"></p>

      <div id="err-2" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4"></div>

      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">OTP Code</label>
        <input id="otp" type="text" maxlength="6" placeholder="6-digit code"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary tracking-widest text-center text-xl font-bold"/>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">New Password</label>
        <input id="newpw" type="password" placeholder="Minimum 8 characters"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm Password</label>
        <input id="confirmpw" type="password" placeholder="Repeat new password"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
      </div>

      <button onclick="resetPassword()" id="btn-reset"
        class="w-full bg-primary hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition">
        Reset Password
      </button>
      <button onclick="goBack()"
        class="w-full mt-3 text-sm text-gray-500 hover:text-gray-700 font-medium">
        ← Back
      </button>
    </div>

    <!-- Step 3: Success -->
    <div id="step-3" class="hidden text-center py-4">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24">
          <path d="M5 13l4 4L19 7" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="text-xl font-black text-gray-900 mb-2">Password Reset!</h2>
      <p class="text-sm text-gray-500 mb-6">Your password has been updated successfully.</p>
      <a href="/login.html" class="block w-full bg-primary hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition text-center">
        Go to Login
      </a>
    </div>

  </div>

  <p class="text-center text-sm text-gray-400 mt-4">
    <a href="/login.html" class="hover:text-primary">← Back to Login</a>
  </p>
</div>

<script>
let email = '';

async function sendOtp() {
  const btn = document.getElementById('btn-otp');
  const err = document.getElementById('err-1');
  email = document.getElementById('email').value.trim().toLowerCase();
  if (!email) { showErr(err, 'Please enter your email address'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr(err, 'Please enter a valid email address'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  err.classList.add('hidden');

  try {
    const res  = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const json = await res.json();
    if (res.ok) {
      document.getElementById('email-display').textContent = email;
      document.getElementById('step-1').classList.add('hidden');
      document.getElementById('step-2').classList.remove('hidden');
    } else {
      showErr(err, json.message || 'Failed to send OTP');
    }
  } catch {
    showErr(err, 'Something went wrong. Try again.');
  }
  btn.disabled = false;
  btn.textContent = 'Send OTP via Email';
}

async function resetPassword() {
  const btn  = document.getElementById('btn-reset');
  const err  = document.getElementById('err-2');
  const otp  = document.getElementById('otp').value.trim();
  const pw   = document.getElementById('newpw').value;
  const cpw  = document.getElementById('confirmpw').value;

  if (!otp || otp.length !== 6) { showErr(err, 'Enter the 6-digit OTP from your email'); return; }
  if (pw.length < 8)            { showErr(err, 'Password must be at least 8 characters'); return; }
  if (pw !== cpw)               { showErr(err, 'Passwords do not match'); return; }

  btn.disabled = true;
  btn.textContent = 'Resetting…';
  err.classList.add('hidden');

  try {
    const res  = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp, newPassword: pw })
    });
    const json = await res.json();
    if (res.ok) {
      document.getElementById('step-2').classList.add('hidden');
      document.getElementById('step-3').classList.remove('hidden');
    } else {
      showErr(err, json.message || 'Reset failed');
    }
  } catch {
    showErr(err, 'Something went wrong. Try again.');
  }
  btn.disabled = false;
  btn.textContent = 'Reset Password';
}

function goBack() {
  document.getElementById('step-1').classList.remove('hidden');
  document.getElementById('step-2').classList.add('hidden');
  document.getElementById('err-2').classList.add('hidden');
}

function showErr(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }
</script>
</body>
</html>
