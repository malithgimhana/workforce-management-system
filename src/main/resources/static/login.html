<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlexiWork — Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#EB1700' } } } }</script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

<nav class="bg-white shadow-sm sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <a href="/index.html" class="flex items-center gap-2 shrink-0">
      <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center">
        <span class="text-white font-black text-sm">FW</span>
      </div>
      <span class="font-black text-xl"><span class="text-gray-900">Flexi</span><span class="text-primary">Work</span></span>
    </a>
    <div class="hidden md:flex items-center gap-7">
      <a href="/index.html" class="text-sm font-medium text-gray-600 hover:text-primary transition">Home</a>
      <a href="/about.html" class="text-sm font-medium text-gray-600 hover:text-primary transition">About</a>
      <a href="/services.html" class="text-sm font-medium text-gray-600 hover:text-primary transition">Services</a>
      <a href="/contact.html" class="text-sm font-medium text-gray-600 hover:text-primary transition">Contact</a>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <a href="/choose-role.html" class="flex items-center gap-1.5 bg-primary hover:bg-red-700 text-white px-5 py-2 rounded-full text-sm font-semibold transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        Register
      </a>
    </div>
  </div>
</nav>

<div class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-xl p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4">
          <span class="text-white font-black text-xl">FW</span>
        </div>
        <h1 class="text-2xl font-black text-gray-900">Welcome back</h1>
        <p class="text-gray-500 text-sm mt-1">Sign in to your FlexiWork account</p>
      </div>

      <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-5"></div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email or Phone</label>
          <input id="identifier" type="text" placeholder="Enter email or phone number"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
            required/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="Enter your password"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition pr-11"
              required/>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn"
          class="w-full bg-primary hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition mt-2 flex items-center justify-center gap-2">
          Sign In
        </button>
        <p class="text-center text-sm text-gray-500 mt-3">
          <a href="/forgot-password.html" class="text-primary font-semibold hover:underline">Forgot Password?</a>
        </p>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="/choose-role.html" class="text-primary font-semibold hover:underline">Create account</a>
      </p>

    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
function redirectByRole(user) {
  if (user.role === 'WORKER')   return window.location.href = '/index.html';
  if (user.role === 'SECURITY') return window.location.href = '/security-scan.html';
  if (user.role === 'ADMIN')    return window.location.href = '/admin.html';
  if (user.role === 'EMPLOYER') {
    if (user.companyRole === 'IT_ADMIN') return window.location.href = '/it-dashboard.html';
    return window.location.href = '/employer-dashboard.html';
  }
}

// If already logged in, redirect
getMe().then(user => { if (user) redirectByRole(user); });

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errBanner = document.getElementById('error-banner');
  errBanner.classList.add('hidden');
  btn.disabled = true;
  btn.innerHTML = `<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg> Signing in...`;

  const res = await apiFetch('/api/auth/login', {
    method: 'POST',
    body: JSON.stringify({
      identifier: document.getElementById('identifier').value.trim(),
      password: document.getElementById('password').value
    })
  });

  const json = await res.json();
  btn.disabled = false;
  btn.innerHTML = 'Sign In';

  if (res.ok) {
    const data = json.data;
    if (data.token) localStorage.setItem('fw_token', data.token);
    localStorage.setItem('fw_user', JSON.stringify(data));
    localStorage.setItem('fw_role', data.role);
    redirectByRole(data);
  } else {
    errBanner.textContent = json.message || 'Invalid credentials. Please try again.';
    errBanner.classList.remove('hidden');
  }
});

function togglePwd() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
}

function fillDemo(email, pwd) {
  document.getElementById('identifier').value = email;
  document.getElementById('password').value = pwd;
}
</script>
</body>
</html>
