<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Security Scanner — FlexiWork</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  :root {
    --red:#EB1700; --red-6:#CE1500; --red-t:#FDF1F0; --red-t2:#FAE3E1;
    --ink:#1A1A1A; --muted:#767676; --muted2:#9A9A9A;
    --line:#ECECEC; --line2:#E2E2E2; --surface:#F6F6F4; --white:#fff;
    --green:#16a34a; --green-t:#DCFCE7;
    --amber:#D97706; --amber-t:#FFF7ED;
    --shadow:0 6px 24px rgba(26,26,26,.09),0 2px 6px rgba(26,26,26,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;}

  /* ── Topbar ── */
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.06);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:38px;height:38px;border-radius:11px;background:var(--red);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;}
  .brand-name{font-weight:800;font-size:17px;letter-spacing:-.4px;}
  .brand-name span{color:var(--red);}
  .guard-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line2);border-radius:50px;padding:5px 13px 5px 7px;font-size:13px;font-weight:600;color:var(--ink);}
  .guard-avatar{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .clock-badge{background:#F0FDF4;color:var(--green);border:1px solid #BBF7D0;font-size:13px;font-weight:700;padding:5px 13px;border-radius:50px;}
  .btn-logout{background:var(--red-t);color:var(--red);border:1.5px solid var(--red-t2);font-size:13px;font-weight:700;padding:7px 16px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-logout:hover{background:var(--red);color:#fff;}

  /* ── Layout ── */
  .main{max-width:720px;margin:0 auto;padding:28px 16px 60px;}

  /* ── Scan card ── */
  .scan-card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}

  /* Camera scanner */
  .camera-panel{padding:24px;display:block;}
  .camera-wrap{position:relative;width:100%;max-width:400px;margin:0 auto;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:1;}
  .camera-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
  .camera-wrap canvas{display:none;}
  .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .scan-frame{width:200px;height:200px;border:3px solid var(--red);border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);animation:scanPulse 1.5s ease-in-out infinite;}
  .scan-line{position:absolute;width:180px;height:3px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:scanLine 2s linear infinite;}
  @keyframes scanPulse{0%,100%{border-color:var(--red);}50%{border-color:#FF6B6B;}}
  @keyframes scanLine{0%{top:calc(50% - 95px);}100%{top:calc(50% + 95px);}}
  .camera-status{text-align:center;margin-top:14px;font-size:13px;color:var(--muted);font-weight:600;}
  .camera-status.scanning{color:var(--red);}
  .btn-camera{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:400px;margin:14px auto 0;padding:13px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
  .btn-camera:hover{background:var(--red-6);}
  .btn-camera.stop{background:#6B7280;}
  .btn-camera.stop:hover{background:#4B5563;}

  /* ── Worker Profile Card ── */
  .worker-card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;display:none;}
  .worker-card-head{padding:24px;display:flex;align-items:center;gap:18px;}
  .worker-card-head.status-approved{background:linear-gradient(135deg,#16a34a,#15803d);}
  .worker-card-head.status-rejected{background:linear-gradient(135deg,var(--red),var(--red-6));}
  .worker-card-head.status-expired {background:linear-gradient(135deg,#D97706,#B45309);}
  .worker-card-head.status-notfound{background:linear-gradient(135deg,#475569,#334155);}
  .worker-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.5);flex-shrink:0;background:#fff;}
  .worker-photo-placeholder{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;border:4px solid rgba(255,255,255,.3);}
  .worker-head-info{flex:1;}
  .worker-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:4px;}
  .worker-meta{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
  .status-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px;}

  .worker-card-body{padding:20px 24px;}
  .job-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .job-detail{background:var(--surface);border-radius:12px;padding:12px 14px;}
  .job-detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);margin-bottom:4px;}
  .job-detail-value{font-size:13.5px;font-weight:700;color:var(--ink);}

  .time-strip{background:#F8FAFC;border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;gap:18px;margin-bottom:18px;flex-wrap:wrap;}
  .time-item{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .time-item strong{color:var(--ink);font-weight:700;}

  .action-row{display:flex;gap:12px;}
  .btn-checkin{flex:1;padding:15px;background:#16a34a;color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-checkin:hover{background:#15803d;}
  .btn-checkout{flex:1;padding:15px;background:#D97706;color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-checkout:hover{background:#B45309;}
  .btn-done{flex:1;padding:15px;background:var(--surface);color:var(--muted);border:1.5px solid var(--line2);border-radius:13px;font-size:15px;font-weight:700;cursor:default;font-family:inherit;}
  .btn-new-scan{flex:1;padding:15px;background:var(--surface);color:var(--ink);border:1.5px solid var(--line2);border-radius:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-new-scan:hover{border-color:var(--muted2);}

  /* ── History ── */
  .history-card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:22px;}
  .history-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .history-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface);border-radius:10px;margin-bottom:8px;}
  .history-item:last-child{margin-bottom:0;}
  .h-name{font-size:13.5px;font-weight:700;color:var(--ink);}
  .h-time{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .h-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;}
  .h-ci{background:var(--green-t);color:var(--green);}
  .h-co{background:var(--amber-t);color:var(--amber);}
  .empty{text-align:center;padding:30px;color:var(--muted2);font-size:13.5px;}

  /* ── Toast ── */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1A;color:#fff;font-size:13.5px;font-weight:600;padding:12px 24px;border-radius:50px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast.ok{background:var(--green);}
  .toast.err{background:var(--red);}

  @media(max-width:500px){
    .topbar{padding:0 14px;}
    .guard-pill span{display:none;}
    .job-detail-grid{grid-template-columns:1fr;}
    .action-row{flex-direction:column;}
    .main{padding:16px 12px 48px;}
  }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a class="brand" href="/index.html" style="text-decoration:none;color:inherit;">
    <div class="brand-mark">FW</div>
    <div class="brand-name">Flexi<span>Work</span> <span style="font-size:11px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line2);padding:2px 8px;border-radius:20px;margin-left:4px;">Security</span></div>
  </a>
  <div class="topbar-right">
    <div class="clock-badge" id="clockBadge">—</div>
    <div class="guard-pill">
      <div class="guard-avatar" id="guardInitial">G</div>
      <span id="guardName">Loading…</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="main">

  <!-- Scan Card -->
  <div class="scan-card">
    <!-- Camera Panel -->
    <div class="camera-panel" id="panel-camera">
      <div class="camera-wrap" id="cameraWrap">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <canvas id="cameraCanvas"></canvas>
        <div class="scan-overlay">
          <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
            <div class="scan-frame" id="scanFrame"></div>
            <div class="scan-line" id="scanLine" style="display:none;"></div>
          </div>
        </div>
      </div>
      <div class="camera-status" id="cameraStatus">Press the button below to start camera</div>
      <button class="btn-camera" id="cameraBtn" onclick="toggleCamera()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Start Camera Scanner
      </button>
    </div>

  </div>

  <!-- Worker Result Card -->
  <div class="worker-card" id="workerCard">
    <div class="worker-card-head" id="workerCardHead">
      <div id="workerPhoto"></div>
      <div class="worker-head-info">
        <div class="worker-name" id="workerName">—</div>
        <div class="worker-meta" id="workerNic"></div>
        <div class="worker-meta" id="workerPhone"></div>
        <div class="status-chip" id="statusChip"></div>
      </div>
    </div>
    <div class="worker-card-body">
      <div class="job-detail-grid">
        <div class="job-detail">
          <div class="job-detail-label">Job</div>
          <div class="job-detail-value" id="jobTitle">—</div>
        </div>
        <div class="job-detail">
          <div class="job-detail-label">Shift Date</div>
          <div class="job-detail-value" id="shiftDate">—</div>
        </div>
        <div class="job-detail">
          <div class="job-detail-label">Location</div>
          <div class="job-detail-value" id="jobLocation">—</div>
        </div>
        <div class="job-detail">
          <div class="job-detail-label">Shift Time</div>
          <div class="job-detail-value" id="shiftTime">—</div>
        </div>
      </div>

      <div class="time-strip" id="timeStrip" style="display:none;">
        <div class="time-item" id="checkInDisplay"></div>
        <div class="time-item" id="checkOutDisplay"></div>
      </div>

      <div class="action-row" id="actionRow"></div>
    </div>
  </div>

  <!-- Scan History -->
  <div class="history-card">
    <div class="history-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Today's Scan History
    </div>
    <div id="scanHistory"><div class="empty">No scans recorded yet today</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentToken = null;
let scanHistory  = [];
let cameraStream = null;
let scanInterval = null;
let scanActive   = false;
let lastScanned  = '';
let lastScannedTime = 0;

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  let name = sessionStorage.getItem('guardName');

  if (!name) {
    try {
      const res  = await fetch('/api/auth/me', { credentials: 'include' });
      const json = await res.json();
      if (res.ok && json.data && json.data.role === 'SECURITY') {
        name = json.data.fullName || json.data.firstName || 'Guard';
      }
    } catch(_) {}
  }

  if (!name) { window.location.href = '/login.html'; return; }

  document.getElementById('guardName').textContent   = name;
  document.getElementById('guardInitial').textContent = name.charAt(0).toUpperCase();
  updateClock();
  setInterval(updateClock, 1000);
});

function updateClock() {
  document.getElementById('clockBadge').textContent =
    new Date().toLocaleTimeString('en-LK', { timeZone:'Asia/Colombo', hour:'2-digit', minute:'2-digit' });
}

// ── Camera QR Scanner ─────────────────────────────────────────────────────────
async function toggleCamera() {
  if (scanActive) { stopCamera(); return; }

  const btn    = document.getElementById('cameraBtn');
  const status = document.getElementById('cameraStatus');

  // Check if camera API is available at all
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    status.textContent = '❌ Camera not available — open this page on localhost or HTTPS';
    status.className = 'camera-status';
    showToast('Camera API unavailable on this origin', 'err');
    return;
  }

  status.textContent = 'Requesting camera access…';
  status.className = 'camera-status';

  try {
    // Try rear camera first (mobile), fall back to any available camera (laptop webcam)
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
    } catch(_) {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
    }
    const video = document.getElementById('cameraVideo');
    video.srcObject = cameraStream;
    await video.play();

    scanActive = true;
    btn.textContent = '';
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg> Stop Scanner`;
    btn.classList.add('stop');
    status.textContent = '🔴 Scanning… Hold QR code inside the frame';
    status.className = 'camera-status scanning';

    document.getElementById('scanLine').style.display = 'block';
    scanInterval = setInterval(scanFrame, 150);

  } catch(err) {
    let msg = '❌ ' + err.name + ': ' + err.message;
    if (err.name === 'NotAllowedError')    msg = '❌ Camera permission denied — allow camera in browser settings';
    if (err.name === 'NotFoundError')      msg = '❌ No camera found on this device';
    if (err.name === 'NotReadableError')   msg = '❌ Camera is in use by another app — close other apps using it';
    if (err.name === 'OverconstrainedError') msg = '❌ Camera constraint error: ' + err.message;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
      msg = '❌ Camera API not available — make sure you are on localhost or HTTPS';
    status.textContent = msg;
    status.className = 'camera-status';
    showToast(msg, 'err');
    console.error('Camera error:', err.name, err.message);
  }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  scanActive = false;
  const btn = document.getElementById('cameraBtn');
  btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Start Camera Scanner`;
  btn.classList.remove('stop');
  document.getElementById('cameraStatus').textContent = 'Press the button below to start camera';
  document.getElementById('cameraStatus').className = 'camera-status';
  document.getElementById('scanLine').style.display = 'none';
}

function scanFrame() {
  const video  = document.getElementById('cameraVideo');
  const canvas = document.getElementById('cameraCanvas');
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts:'dontInvert' });

  if (code && code.data) {
    const now = Date.now();
    if (code.data !== lastScanned || now - lastScannedTime > 4000) {
      lastScanned     = code.data;
      lastScannedTime = now;
      stopCamera();
      handleQrData(code.data);
    }
  }
}

function handleQrData(raw) {
  // Extract token from URL or use raw
  const urlMatch = raw.match(/token=([^&]+)/);
  currentToken = urlMatch ? urlMatch[1] : raw;
  showToast('QR detected! Loading worker…', '');
  verifyQrToken(currentToken);
}

// ── Verify QR with backend ────────────────────────────────────────────────────
async function verifyQrToken(token) {
  try {
    const res  = await fetch('/api/qr/verify/' + encodeURIComponent(token), { credentials: 'include' });
    const data = await res.json();
    showWorkerCard(data.data || {});
  } catch(e) {
    showToast('Error verifying QR', 'err');
  }
}

// ── Worker Card ───────────────────────────────────────────────────────────────
function showWorkerCard(d) {
  const card = document.getElementById('workerCard');
  card.style.display = 'block';

  // Head colour
  const headCls = {
    APPROVED: 'status-approved', REJECTED: 'status-rejected',
    EXPIRED:  'status-expired',  NOT_FOUND: 'status-notfound'
  };
  const head = document.getElementById('workerCardHead');
  head.className = 'worker-card-head ' + (headCls[d.status] || 'status-notfound');

  // Photo
  const photoEl = document.getElementById('workerPhoto');
  if (d.photo) {
    photoEl.innerHTML = `<img src="/uploads/${d.photo}" class="worker-photo" alt="Worker photo"/>`;
  } else {
    photoEl.innerHTML = `<div class="worker-photo-placeholder">👷</div>`;
  }

  // Info
  document.getElementById('workerName').textContent  = d.workerName || 'Unknown Worker';
  document.getElementById('workerNic').innerHTML     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> NIC: ${d.nic || 'N/A'}`;
  document.getElementById('workerPhone').innerHTML   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.8 19.8 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg> ${d.phone || 'N/A'}`;

  const statusLabels = { APPROVED:'✅ Approved', REJECTED:'❌ Not Approved', EXPIRED:'⏰ QR Expired', NOT_FOUND:'🚫 Not Found' };
  document.getElementById('statusChip').textContent = statusLabels[d.status] || '❓ Unknown';

  // Job details
  document.getElementById('jobTitle').textContent    = d.jobTitle    || '—';
  document.getElementById('shiftDate').textContent   = d.shiftDate   || '—';
  document.getElementById('jobLocation').textContent = d.jobLocation || '—';
  document.getElementById('shiftTime').textContent   = d.shiftStart && d.shiftEnd ? `${d.shiftStart} – ${d.shiftEnd}` : '—';

  // Check-in / out times
  const strip = document.getElementById('timeStrip');
  if (d.checkInTime || d.checkOutTime) {
    strip.style.display = 'flex';
    document.getElementById('checkInDisplay').innerHTML  = d.checkInTime  ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Check-In: <strong>${fmtTime(d.checkInTime)}</strong>` : '';
    document.getElementById('checkOutDisplay').innerHTML = d.checkOutTime ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Check-Out: <strong>${fmtTime(d.checkOutTime)}</strong>` : '';
  } else {
    strip.style.display = 'none';
  }

  // Action buttons
  const row = document.getElementById('actionRow');
  row.innerHTML = '';
  if (d.status === 'APPROVED') {
    if (!d.checkInTime) {
      row.innerHTML = `
        <button class="btn-checkin" onclick="recordAttendance()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Mark Check-In
        </button>
        <button class="btn-new-scan" onclick="resetScan()">New Scan</button>`;
    } else if (!d.checkOutTime) {
      row.innerHTML = `
        <button class="btn-checkout" onclick="recordAttendance()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Mark Check-Out
        </button>
        <button class="btn-new-scan" onclick="resetScan()">New Scan</button>`;
    } else {
      row.innerHTML = `
        <button class="btn-done" disabled>✅ Shift Completed</button>
        <button class="btn-new-scan" onclick="resetScan()">New Scan</button>`;
    }
  } else {
    row.innerHTML = `<button class="btn-new-scan" style="flex:1;" onclick="resetScan()">← Scan Another</button>`;
  }

  card.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ── Attendance ────────────────────────────────────────────────────────────────
async function recordAttendance() {
  if (!currentToken) return;
  try {
    const csrf = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
    const csrfVal = csrf ? decodeURIComponent(csrf[1]) : '';
    const res  = await fetch('/api/qr/attendance/' + encodeURIComponent(currentToken), {
      method:'POST', credentials:'include',
      headers:{ 'X-XSRF-TOKEN': csrfVal, 'Content-Type':'application/json' }
    });
    const data = await res.json();
    if (res.ok) {
      const action = data.data?.action || 'CHECK_IN';
      const isIn = action === 'CHECK_IN';
      showToast(isIn ? '✅ Check-In recorded!' : '🏁 Check-Out recorded!', 'ok');
      addHistory(document.getElementById('workerName').textContent, action);
      setTimeout(() => verifyQrToken(currentToken), 700);
    } else {
      showToast(data.message || 'Error recording attendance', 'err');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  }
}

function resetScan() {
  document.getElementById('workerCard').style.display = 'none';
  currentToken = null;
}

function addHistory(name, action) {
  const time = new Date().toLocaleTimeString('en-LK', { timeZone:'Asia/Colombo', hour:'2-digit', minute:'2-digit' });
  scanHistory.unshift({ name, action, time });
  document.getElementById('scanHistory').innerHTML = scanHistory.map(h => `
    <div class="history-item">
      <div>
        <div class="h-name">${esc(h.name)}</div>
        <div class="h-time">${h.time}</div>
      </div>
      <span class="h-badge ${h.action === 'CHECK_IN' ? 'h-ci' : 'h-co'}">${h.action === 'CHECK_IN' ? 'CHECK IN' : 'CHECK OUT'}</span>
    </div>`).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleTimeString('en-LK', { timeZone:'Asia/Colombo', hour:'2-digit', minute:'2-digit' });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 3000);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function logout() {
  const csrf = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
  await fetch('/api/auth/logout', {
    method:'POST', credentials:'include',
    headers:{ 'X-XSRF-TOKEN': csrf ? decodeURIComponent(csrf[1]) : '' }
  });
  sessionStorage.clear();
  window.location.href = '/login.html';
}
